<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">PromptForge 404</title>
  <desc id="desc">Mockup visual de consola profesional para prompts, workflows, loops de auditoría y skills.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16091f"></stop>
      <stop offset="0.48" stop-color="#241032"></stop>
      <stop offset="1" stop-color="#07121f"></stop>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c1740" stop-opacity="0.95"></stop>
      <stop offset="1" stop-color="#091624" stop-opacity="0.96"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8b4fe"></stop>
      <stop offset="0.5" stop-color="#7dd3fc"></stop>
      <stop offset="1" stop-color="#facc15"></stop>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="42" fill="url(#bg)"></rect>
  <circle cx="1030" cy="120" r="180" fill="#7c3aed" opacity="0.18" filter="url(#glow)"></circle>
  <circle cx="170" cy="650" r="220" fill="#0891b2" opacity="0.12" filter="url(#glow)"></circle>
  <rect x="72" y="70" width="1056" height="620" rx="34" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"></rect>
  <rect x="108" y="108" width="984" height="54" rx="18" fill="#050814" opacity="0.72" stroke="#ffffff" stroke-opacity="0.1"></rect>
  <circle cx="140" cy="135" r="7" fill="#f87171"></circle><circle cx="166" cy="135" r="7" fill="#fbbf24"></circle><circle cx="192" cy="135" r="7" fill="#34d399"></circle>
  <text x="225" y="143" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">PromptForge 404 · Workflow Console</text>
  <rect x="108" y="195" width="270" height="430" rx="24" fill="#080d18" opacity="0.72" stroke="#ffffff" stroke-opacity="0.1"></rect>
  <text x="140" y="245" fill="#f5d0fe" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Skills</text>
  <text x="140" y="282" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="17">Claude · ChatGPT · Gemini</text>
  <g font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="138" y="322" width="204" height="46" rx="14" fill="#7c3aed" opacity="0.22"></rect><text x="160" y="351" fill="#e9d5ff">Loop auditoría</text>
    <rect x="138" y="384" width="204" height="46" rx="14" fill="#0891b2" opacity="0.18"></rect><text x="160" y="413" fill="#bae6fd">Prompt maestro</text>
    <rect x="138" y="446" width="204" height="46" rx="14" fill="#ca8a04" opacity="0.16"></rect><text x="160" y="475" fill="#fde68a">Skill reutilizable</text>
    <rect x="138" y="508" width="204" height="46" rx="14" fill="#334155" opacity="0.52"></rect><text x="160" y="537" fill="#cbd5e1">Cursor / Copilot</text>
  </g>
  <rect x="415" y="195" width="677" height="430" rx="24" fill="#050814" opacity="0.76" stroke="#ffffff" stroke-opacity="0.1"></rect>
  <text x="455" y="248" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">PROMPTFORGE</text>
  <rect x="455" y="276" width="245" height="6" rx="3" fill="url(#accent)"></rect>
  <text x="455" y="330" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">Construye prompts avanzados, workflows y loops</text>
  <text x="455" y="363" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="19">para auditoría, edición, código y automatización creativa.</text>
  <g fill="none" stroke-linecap="round" stroke-width="3">
    <path d="M475 435h140l42-44h118" stroke="#d8b4fe"></path>
    <path d="M475 493h190l46 38h150" stroke="#7dd3fc"></path>
    <path d="M475 552h120l40-40h240" stroke="#facc15"></path>
  </g>
  <g fill="#0f172a" stroke="#ffffff" stroke-opacity="0.12">
    <rect x="720" y="405" width="285" height="52" rx="16"></rect><rect x="720" y="482" width="285" height="52" rx="16"></rect><rect x="720" y="559" width="285" height="52" rx="16"></rect>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">
    <text x="745" y="438" fill="#f5d0fe">AUDIT LOOP</text><text x="745" y="515" fill="#bae6fd">MODEL READY</text><text x="745" y="592" fill="#fde68a">EXPORT SKILL</text>
  </g>
  <text x="108" y="675" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">100% local · sin backend · GitHub Pages</text>
</svg>