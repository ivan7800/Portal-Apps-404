<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">The Net 404 — Internet 1996 Simulator</title>
  <desc id="desc">Escritorio retro NEXUS/96 con navegador, correo, terminal y tablero de investigación</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050807"></stop>
      <stop offset="0.55" stop-color="#0c1713"></stop>
      <stop offset="1" stop-color="#050606"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="22%" r="70%">
      <stop offset="0" stop-color="#42ff9a" stop-opacity=".24"></stop>
      <stop offset="1" stop-color="#42ff9a" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="#000" opacity=".08"></rect>
    </pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".55"></feDropShadow></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"></rect>
  <rect width="1280" height="720" fill="url(#glow)"></rect>
  <rect width="1280" height="720" fill="url(#scan)" opacity=".48"></rect>

  <g transform="translate(62 46)">
    <text x="0" y="18" fill="#58ff9f" font-family="monospace" font-size="17" letter-spacing="7">NEXUS/96 PERSONAL NETWORK ENVIRONMENT</text>
    <text x="0" y="88" fill="#f2fff8" font-family="Georgia,serif" font-size="66">The Net 404</text>
    <text x="0" y="126" fill="#9fb8aa" font-family="monospace" font-size="20">IDENTIDAD DIGITAL · CONSPIRACIÓN · INTERNET 1996</text>
  </g>

  <g transform="translate(62 205)" filter="url(#shadow)">
    <rect width="790" height="405" rx="16" fill="#0b100e" stroke="#4dff9a" stroke-opacity=".42"></rect>
    <rect width="790" height="38" rx="16" fill="#14201a"></rect>
    <rect y="24" width="790" height="14" fill="#14201a"></rect>
    <circle cx="24" cy="19" r="6" fill="#ff5d65"></circle><circle cx="45" cy="19" r="6" fill="#ffd45d"></circle><circle cx="66" cy="19" r="6" fill="#55e58b"></circle>
    <text x="96" y="25" fill="#d9ffe8" font-family="monospace" font-size="15">Nexus Online — CONNECTED</text>

    <rect x="18" y="58" width="754" height="44" rx="7" fill="#0f1713" stroke="#315440"></rect>
    <text x="34" y="85" fill="#8dffbc" font-family="monospace" font-size="16">←  →  ⌂  ↻   Dirección: mozarts-ghost.net</text>

    <g transform="translate(18 120)">
      <rect width="355" height="251" rx="8" fill="#07100c" stroke="#264d37"></rect>
      <text x="20" y="32" fill="#54ff9e" font-family="monospace" font-size="15">WORLDSEARCH 96 / INDEX READY</text>
      <text x="20" y="72" fill="#eefdf4" font-family="monospace" font-size="21">¿QUIÉN BORRÓ TU IDENTIDAD?</text>
      <text x="20" y="108" fill="#92a99a" font-family="monospace" font-size="14">24 sitios conectados</text>
      <text x="20" y="134" fill="#92a99a" font-family="monospace" font-size="14">128 archivos locales</text>
      <text x="20" y="160" fill="#92a99a" font-family="monospace" font-size="14">8 secretos sin localizar</text>
      <rect x="20" y="192" width="210" height="38" rx="4" fill="#46f793"></rect>
      <text x="38" y="217" fill="#06100b" font-family="monospace" font-weight="700" font-size="15">ABRIR EXPEDIENTE</text>
    </g>

    <g transform="translate(392 120)">
      <rect width="380" height="116" rx="8" fill="#070d0a" stroke="#264d37"></rect>
      <text x="18" y="28" fill="#54ff9e" font-family="monospace" font-size="14">NEXUS SHELL — SESSION 404</text>
      <text x="18" y="58" fill="#e9fff1" font-family="monospace" font-size="15">C:\NEXUS&gt; scan gatekeeper</text>
      <text x="18" y="86" fill="#7bdba4" font-family="monospace" font-size="14">TRACE FOUND: MAD-04 / JANUS</text>
      <rect y="134" width="380" height="117" rx="8" fill="#101713" stroke="#264d37"></rect>
      <text x="18" y="163" fill="#54ff9e" font-family="monospace" font-size="14">MAILBOX — 1 URGENTE</text>
      <text x="18" y="194" fill="#f4fff8" font-family="monospace" font-size="16">MAYA: «No confíes en tu expediente.»</text>
      <text x="18" y="223" fill="#8ba497" font-family="monospace" font-size="13">La red ya tiene una copia de ti.</text>
    </g>
