  <g transform="translate(885 205)" filter="url(#shadow)">
    <rect width="333" height="405" rx="16" fill="#0b100e" stroke="#4dff9a" stroke-opacity=".35"></rect>
    <text x="24" y="42" fill="#58ff9f" font-family="monospace" font-size="15" letter-spacing="3">CASEBOARD 404</text>
    <text x="24" y="84" fill="#f0fff6" font-family="Georgia,serif" font-size="29">IDENTITY ZERO</text>
    <g font-family="monospace" font-size="14">
      <rect x="24" y="112" width="285" height="48" rx="7" fill="#121e18"></rect><text x="42" y="142" fill="#dfffee">PRUEBAS 0 / 4</text>
      <rect x="24" y="174" width="285" height="48" rx="7" fill="#121e18"></rect><text x="42" y="204" fill="#dfffee">SECRETOS 0 / 8</text>
      <rect x="24" y="236" width="285" height="48" rx="7" fill="#121e18"></rect><text x="42" y="266" fill="#dfffee">INTEGRIDAD 100%</text>
      <rect x="24" y="310" width="285" height="58" rx="7" fill="#46f793"></rect><text x="42" y="345" fill="#06100b" font-weight="700">CONECTAR A INTERNET →</text>
