    <radialGradient id="glow" cx="76%" cy="20%" r="70%"><stop stop-color="#22d3ee" stop-opacity=".48"/><stop offset=".45" stop-color="#22d3ee" stop-opacity=".12"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <style>
