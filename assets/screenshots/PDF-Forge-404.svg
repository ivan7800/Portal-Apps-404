<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">PDF Forge 404</title>
  <desc id="desc">Mockup premium de una herramienta local para convertir PDF a Word y Word a PDF.</desc>
