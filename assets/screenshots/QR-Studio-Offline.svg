<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Mockup de QR Studio Offline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#060913"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <radialGradient id="glow" cx="76%" cy="20%" r="70%"><stop stop-color="#22d3ee" stop-opacity=".48"/><stop offset=".45" stop-color="#22d3ee" stop-opacity=".12"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <style>
      .font { font-family: Inter, Arial, Helvetica, sans-serif; }
      .meta { font-size: 19px; font-weight: 800; fill: rgba(255,255,255,.74); letter-spacing: 4px; text-transform: uppercase; }
      .title { font-size: 54px; font-weight: 950; fill: #f8fbff; letter-spacing: -2.6px; }
      .sub { font-size: 24px; fill: rgba(248,251,255,.72); }
      .label { font-size: 16px; font-weight: 800; fill: rgba(248,251,255,.74); letter-spacing: 1px; }
