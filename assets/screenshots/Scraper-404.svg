<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Scraper 404</title>
  <desc id="desc">Analizador y extractor de datos web en navegador</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#06111f"></stop>
      <stop offset="0.48" stop-color="#0b1728"></stop>
      <stop offset="1" stop-color="#111827"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#22d3ee"></stop>
      <stop offset="1" stop-color="#a78bfa"></stop>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"></rect>
  <circle cx="1075" cy="110" r="260" fill="#22d3ee" opacity=".10" filter="url(#glow)"></circle>
  <circle cx="960" cy="610" r="230" fill="#a78bfa" opacity=".09" filter="url(#glow)"></circle>
  <rect x="28" y="28" width="1224" height="664" rx="34" fill="rgba(255,255,255,.018)" stroke="rgba(255,255,255,.18)" stroke-width="2"></rect>
  <text x="64" y="94" class="font meta">UNIVERSO 404 · WEB DATA</text>
  <text x="64" y="166" class="font title">Scraper 404</text>
  <text x="66" y="210" class="font sub">Analizador y extractor de datos web · 100% navegador</text>
  <rect x="64" y="262" width="500" height="312" rx="24" class="panel"></rect>
  <rect x="94" y="300" width="440" height="48" rx="14" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.14)"></rect>
  <text x="116" y="331" class="font small">https://ejemplo.com/referencia</text>
  <rect x="94" y="374" width="132" height="42" rx="21" fill="url(#accent)" opacity=".94"></rect>
  <text x="124" y="402" class="font label" fill="#03131f">Analizar</text>
  <rect x="246" y="374" width="132" height="42" rx="21" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)"></rect>
  <text x="274" y="402" class="font label">Extraer</text>
  <rect x="398" y="374" width="132" height="42" rx="21" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.16)"></rect>
  <text x="430" y="402" class="font label">Exportar</text>
  <g transform="translate(96 458)">
    <rect width="438" height="86" rx="18" class="panel2"></rect>
    <text x="24" y="34" class="font label">Sin backend · sin registro</text>
    <text x="24" y="62" class="font small">Datos visibles, enlaces, estructura y señales técnicas.</text>
  </g>
  <rect x="610" y="250" width="588" height="330" rx="26" class="panel"></rect>
  <text x="640" y="292" class="font label">Vista de extracción</text>
  <g transform="translate(640 326)">
    <rect width="528" height="42" rx="12" fill="rgba(34,211,238,.14)" stroke="rgba(34,211,238,.30)"></rect>
    <text x="18" y="27" class="font small">selector</text><text x="160" y="27" class="font small">valor detectado</text><text x="395" y="27" class="font small">estado</text>
    <g transform="translate(0 58)">
      <rect width="528" height="38" rx="10" fill="rgba(255,255,255,.055)"></rect><text x="18" y="25" class="font small">h1.title</text><text x="160" y="25" class="font small">Título principal</text><circle cx="420" cy="19" r="8" fill="#22c55e"></circle>
    </g>
    <g transform="translate(0 108)">
      <rect width="528" height="38" rx="10" fill="rgba(255,255,255,.045)"></rect><text x="18" y="25" class="font small">a[href]</text><text x="160" y="25" class="font small">24 enlaces</text><circle cx="420" cy="19" r="8" fill="#22d3ee"></circle>
    </g>
    <g transform="translate(0 158)">
      <rect width="528" height="38" rx="10" fill="rgba(255,255,255,.055)"></rect><text x="18" y="25" class="font small">table tr</text><text x="160" y="25" class="font small">CSV preparado</text><circle cx="420" cy="19" r="8" fill="#a78bfa"></circle>
    </g>
    <g transform="translate(0 208)">
      <rect width="528" height="38" rx="10" fill="rgba(255,255,255,.045)"></rect><text x="18" y="25" class="font small">meta[name]</text><text x="160" y="25" class="font small">SEO / señales</text><circle cx="420" cy="19" r="8" fill="#fbbf24"></circle>
    </g>
  </g>
  <path d="M565 420 C602 420 602 408 638 408" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"></path>
  <text x="64" y="632" class="font meta">STATIC · LOCAL · GITHUB PAGES READY</text>
</svg>