<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Entidad 404 — Digital Creature Simulator</title>
  <desc id="desc">Portada oscura premium para una mascota virtual digital en evolución.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0" stop-color="#17213b"></stop>
      <stop offset="0.52" stop-color="#090d18"></stop>
      <stop offset="1" stop-color="#03050a"></stop>
    </radialGradient>
    <radialGradient id="egg" cx="40%" cy="30%" r="70%">
