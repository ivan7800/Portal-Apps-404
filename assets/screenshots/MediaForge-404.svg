<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MediaForge 404</title>
  <desc id="desc">Reproductor multimedia privado con motor U404, conversión WebAssembly, biblioteca, Audio Lab e inspector técnico</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#03060c"></stop>
      <stop offset="0.5" stop-color="#071522"></stop>
      <stop offset="1" stop-color="#101827"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#22d3ee"></stop>
      <stop offset="0.52" stop-color="#38bdf8"></stop>
      <stop offset="1" stop-color="#a78bfa"></stop>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#0c2030"></stop>
      <stop offset="1" stop-color="#040911"></stop>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"></rect>
  <circle cx="1075" cy="110" r="260" fill="#22d3ee" opacity=".085" filter="url(#glow)"></circle>
  <circle cx="1010" cy="640" r="250" fill="#a78bfa" opacity=".07" filter="url(#glow)"></circle>
  <rect x="28" y="28" width="1224" height="664" rx="34" fill="#050a12" stroke="#2a3b4f" stroke-width="2"></rect>

  <text x="64" y="91" class="font meta">UNIVERSO 404 · UNIVERSAL MEDIA ENGINE</text>
  <text x="64" y="166" class="font title">MediaForge 404</text>
  <text x="66" y="210" class="font sub">Reproduce · convierte · organiza · inspecciona</text>

