<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">404 Radio Studio</title>
  <desc id="desc">Mockup premium de una radio web estática para GitHub Pages.</desc>
  <defs>
