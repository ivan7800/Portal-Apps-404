    <linearGradient id="dial" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"></stop><stop offset="1" stop-color="#f59e0b"></stop></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge></filter>
  </defs>
